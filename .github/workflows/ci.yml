name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv pandas numpy pytest pytest-cov

      - name: Run tests with coverage
        env:
          OANDA_PRACTICE_ACCOUNT_ID: test_account
          OANDA_PRACTICE_TOKEN: test_token
          COINBASE_API_KEY: test_key
          COINBASE_API_SECRET: test_secret
        run: |
          pytest tests/test_signal_engine.py tests/test_news_scanner.py tests/test_positions_registry.py \
            -v --tb=short --cov=services --cov-report=term-missing \
            -k "not live"
